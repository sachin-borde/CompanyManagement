spring.application.name=CompanyManagement
# ===============================
# = DATA SOURCE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/CompanyManagement?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Ensure Spring runs src/main/resources/data.sql for non-embedded DBs
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
# Defer datasource initialization until after Hibernate auto DDL so tables exist
spring.jpa.defer-datasource-initialization=true

# ===============================
# = SERVER PORT (Optional)
# ===============================
server.port=8080